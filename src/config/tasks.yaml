
identify_parameters_task:
  description: >
    You are given a directory {docs_dir} containing multiple files. These files include
    information written by or about an investor — including their investment decisions,
    philosophies, heuristics, comments, and thought processes.

    Your task is to carefully extract *as many relevant parameters, focus areas, and
    recurring analytical themes* as possible from this material. These parameters should
    represent the aspects the investor consistently pays attention to when evaluating an
    investment opportunity (usually stocks or public companies).

    The goal at this stage is **not** to provide detailed analysis, judgments, or examples.
    Instead, accurately identify and clearly name each focus area/theme that appears
    meaningful or repeatedly emphasized by the investor. Keep descriptions brief, but
    ensure they are unambiguous and correctly reflect the investor’s thinking patterns.

    After extracting the parameters, save them as a Markdown file named `parameters.md`
    in the provided output directory {output_dir}. Each parameter should be a bullet point
    with a short 1–2 sentence explanation.

  expected_output: >
    A structured point-wise list of all identified parameters and focus areas.


extract_framework_task:
  description: >
    Review the context you got 
    Your task is to read the list of parameters from that context and, for each parameter,
    perform a deep, structured analysis using the previously provided documents about
    the investor.

    For each individual parameter, extract and document:
      • The investor’s detailed interpretation of that parameter  
      • What they consider “good”, “ideal”, or “desirable”  
      • What they consider “bad”, risky, or undesirable  
      • Common heuristics, rules, indicators, and thresholds  
      • Examples (generic or implied by their writings)  
      • Edge cases or nuances the investor cares about  
      • How that parameter interacts with other parameters (if applicable)
      • Make sure that you include both qualitative and quantitative parameters - wherever mentioned.
      • Especially include numbers where financial ratios are mentioned.

    Your output should be extremely detailed. Save **each parameter’s analysis as a separate
    Markdown (.md) file** inside a subfolder named `parameters/` within {output_dir}.
    The filenames should be derived from the parameter name (e.g., `valuation.md`,
    `management_quality.md`).

  expected_output: >
    A set of Markdown files — one per focus area/parameter — saved inside
    {output_dir}/parameters/, each containing a highly detailed, multi-section
    analysis describing how the investor evaluates that parameter and how it influences
    their decision-making.



web_correlate_task:
  description: >
    You are given a share: {share_name}.
    You are given a framework which defines one core focus area
    of an investor's investment framework.
    
    {framework}

    ---

    Perform targeted online research for the given share,
    focusing ONLY on information relevant to the focus area described
    in the file.

    Based on the researched information, evaluate how well the share's
    current state aligns with the rules of this focus area.

    Do NOT make an investment recommendation.
    Do NOT compute any weighted averages.
    Focus only on alignment vs misalignment.

  expected_output: >
    Return the response in the following STRICT format:

    - Alignment highlights (max 3 bullet points)
    - Misalignment / risk factors (max 3 bullet points)
    - Brief overall assessment (1 bullet point)

    FINAL_SCORE: X

    Where:
    - X is an integer between 0 and 100
    - FINAL_SCORE must be on its own line
    - Do not include any text after the FINAL_SCORE line
    - Do not include percentages, symbols, or explanations after the number





